version: '3.9'

volumes:
  app_data:
  bundle_volume:
  db_data:

services:
  app:
    env_file: .env
    container_name: ${PROJECT_NAME}-app
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - app_data:/app
      - bundle_volume:/usr/local/bundle
    command: bundle exec rails s -p 9000 -b 0.0.0.0
    ports:
      - "9000:9000"
    depends_on:
      - db

  sidekiq:
    env_file: .env
    container_name: ${PROJECT_NAME}-sidekiq
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - app_data:/app
      -  bundle_volume:/usr/local/bundle
    command: bundle exec sidekiq
    depends_on:
      - app
      - db
      - redis

  db:
    env_file: .env
    container_name: ${PROJECT_NAME}-db
    image: postgres:12-alpine
    volumes:
      - ./docker/db:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  web:
    container_name: ${PROJECT_NAME}-nginx
    working_dir: /app
    build: docker/webserver
    volumes:
      - app_data:/app
      - ./docker/webserver/log:/var/log/nginx/
    ports:
      - "3000:80"
      - "3001:443"
    depends_on:
      - app
      - db

  redis:
    image: redis:alpine
